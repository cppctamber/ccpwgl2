<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Carbon ccpwgl Agent</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #020307;
        }

        #canvas3d,
        #canvas2d {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        #canvas2d {
            pointer-events: none;
        }

        #status {
            position: fixed;
            left: 10px;
            bottom: 10px;
            z-index: 2;
            padding: 6px 8px;
            font: 12px/1.4 Consolas, monospace;
            color: #dfe8ff;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <canvas id="canvas3d"></canvas>
    <canvas id="canvas2d"></canvas>
    <div id="status">booting</div>

    <script src="../../dist/ccpwgl2_int.js"></script>
    <script type="module" src="./agent.js"></script>
</body>
</html>
